# .github/workflows/verify-and-merge.yml
name: Verify Signed Patch and Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

env:
  COSIGN_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAExve6x4wAH+J/VhydkhR/MpuBaX2S
    fdGodsMUGJyXC/ciMMRcRFMdBjXnTeSbDfQuBVh4gRs2hx0d+7RKd3sMuA==
    -----END PUBLIC KEY-----

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Write public key to file
        run: echo "$COSIGN_PUBLIC_KEY" > cosign.pub

      - name: Get changed files
        id: changed
        run: |
          git fetch origin ${{ github.event.pull_request.base.sha }}
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- . ':!signatures/')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Verify each changed file's signature
        id: verify
        run: |
          set -e
          FAILED=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            base=$(basename "$file")
            name="${base%.*}"
            # match the naming convention used in Cell 17: {file_base}_{function_name}.sig
            sig=$(find signatures -name "${name}_*.sig" | head -n1)
            if [ -z "$sig" ]; then
              echo "No signature found for $file"
              FAILED=1
              continue
            fi
            echo "Verifying $file against $sig"
            if ! cosign verify-blob --key cosign.pub --signature "$sig" "$file"; then
              echo "Verification FAILED for $file"
              FAILED=1
            else
              echo "Verification OK for $file"
            fi
          done <<< "${{ steps.changed.outputs.files }}"
          if [ "$FAILED" -eq 1 ]; then
            echo "verified=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "verified=true" >> "$GITHUB_OUTPUT"

      - name: Auto-merge verified PR
        if: success() && steps.verify.outputs.verified == 'true'
        run: gh pr merge "${{ github.event.pull_request.number }}" --merge --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
